<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <meta name="color-scheme" content="dark light" />
  <meta name="robots" content="noindex, nofollow" />
  <title>{{ user.username }} - Sub Info</title>

  <!-- Vazirmatn font (enhances when reachable; gracefully falls back to system fonts) -->
  <style>
    @font-face{font-family:'Vazirmatn';font-style:normal;font-weight:300 800;font-display:swap;
      src:url('https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/fonts/webfonts/Vazirmatn[wght].woff2') format('woff2');}

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --accent:#3b82f6; --accent-2:#6366f1;
      --bg:#0a0e16; --bg-2:#0e1421; --card:#141c2b; --card-2:#1a2333; --inset:#0e1623;
      --text:#e8eef7; --muted:#8a98ad; --line:#23304a;
      --ok:#22c55e; --warn:#f59e0b; --bad:#ef4444; --hold:#3b82f6; --off:#6b7280;
      --radius:18px; --radius-sm:12px;
      --shadow:0 14px 40px rgba(0,0,0,.45);
      --ring-track:#22304a;
    }
    html[data-theme="light"]{
      --bg:#eef2f8; --bg-2:#e7edf6; --card:#ffffff; --card-2:#f4f7fc; --inset:#f0f4fa;
      --text:#0f1a2c; --muted:#5a6b84; --line:#e3eaf4;
      --shadow:0 14px 40px rgba(20,40,80,.10);
      --ring-track:#e3eaf4;
    }
    html{-webkit-text-size-adjust:100%}
    body{
      font-family:'Vazirmatn','Segoe UI',Tahoma,system-ui,-apple-system,'Iran Sans',Arial,sans-serif;
      background:
        radial-gradient(900px 500px at 100% -10%, color-mix(in srgb,var(--accent) 22%,transparent), transparent 60%),
        radial-gradient(900px 500px at 0% -10%, color-mix(in srgb,var(--accent-2) 18%,transparent), transparent 60%),
        linear-gradient(180deg,var(--bg-2),var(--bg));
      color:var(--text);min-height:100vh;line-height:1.6;
      padding:18px 14px 40px;
    }
    .wrap{max-width:760px;margin:0 auto}
    a{color:inherit;text-decoration:none}

    /* ---- top bar ---- */
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:18px}
    .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:1.15rem;letter-spacing:.2px}
    .brand .logo{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;font-size:1.35rem;overflow:hidden;
      background:linear-gradient(135deg,var(--accent),var(--accent-2));box-shadow:var(--shadow)}
    .tools{display:flex;gap:8px}
    .icon-btn{width:42px;height:42px;border-radius:13px;border:1px solid var(--line);background:var(--card);
      color:var(--text);cursor:pointer;display:grid;place-items:center;font-size:1.05rem;transition:.18s;font-family:inherit}
    .icon-btn:hover{background:var(--card-2);transform:translateY(-1px)}

    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
      padding:18px;margin-bottom:16px}
    .card-h{display:flex;align-items:center;gap:8px;font-weight:700;font-size:1.02rem;margin-bottom:14px}
    .card-h .dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
    .muted{color:var(--muted)}
    .small{font-size:.82rem}

    /* ---- profile ---- */
    .profile{display:flex;align-items:center;gap:14px}
    .avatar{width:56px;height:56px;border-radius:16px;display:grid;place-items:center;font-size:1.5rem;font-weight:800;
      background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 35%,var(--card-2)),var(--card-2));
      border:1px solid var(--line);text-transform:uppercase;flex:none}
    .profile .name{font-weight:800;font-size:1.2rem;word-break:break-all}
    .badge{display:inline-flex;align-items:center;gap:6px;font-size:.78rem;font-weight:700;padding:3px 10px;border-radius:999px;
      border:1px solid transparent}
    .badge::before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor}
    .b-ok{color:var(--ok);background:color-mix(in srgb,var(--ok) 14%,transparent);border-color:color-mix(in srgb,var(--ok) 30%,transparent)}
    .b-warn{color:var(--warn);background:color-mix(in srgb,var(--warn) 14%,transparent);border-color:color-mix(in srgb,var(--warn) 30%,transparent)}
    .b-bad{color:var(--bad);background:color-mix(in srgb,var(--bad) 14%,transparent);border-color:color-mix(in srgb,var(--bad) 30%,transparent)}
    .b-hold{color:var(--hold);background:color-mix(in srgb,var(--hold) 14%,transparent);border-color:color-mix(in srgb,var(--hold) 30%,transparent)}
    .b-off{color:var(--off);background:color-mix(in srgb,var(--off) 14%,transparent);border-color:color-mix(in srgb,var(--off) 30%,transparent)}
    .online{font-size:.78rem}
    .online .pulse{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--ok);margin-inline-end:5px;
      box-shadow:0 0 0 0 color-mix(in srgb,var(--ok) 60%,transparent);animation:pulse 1.8s infinite}
    @keyframes pulse{0%{box-shadow:0 0 0 0 color-mix(in srgb,var(--ok) 55%,transparent)}70%{box-shadow:0 0 0 9px transparent}100%{box-shadow:0 0 0 0 transparent}}

    /* ---- stats / rings ---- */
    .stats{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
    .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
      padding:18px 14px;text-align:center}
    .ring-wrap{position:relative;width:132px;height:132px;margin:2px auto 10px}
    .ring{width:132px;height:132px;transform:rotate(-90deg)}
    .ring-bg{fill:none;stroke:var(--ring-track);stroke-width:11}
    .ring-fg{fill:none;stroke-width:11;stroke-linecap:round;transition:stroke-dashoffset .9s cubic-bezier(.4,0,.2,1)}
    .ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}
    .ring-big{font-size:1.85rem;font-weight:800;line-height:1}
    .ring-big .u{font-size:.95rem;font-weight:700;color:var(--muted)}
    .ring-sub{font-size:.74rem;color:var(--muted);font-weight:600}
    .stat .lbl{font-size:.86rem;color:var(--muted);margin-bottom:6px;font-weight:600}
    .stat .val{font-weight:700;font-size:.92rem}
    .stat .val b{font-weight:800}

    /* ---- key/value rows ---- */
    .rows{display:grid;gap:2px}
    .row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 2px;border-bottom:1px dashed var(--line)}
    .row:last-child{border-bottom:0}
    .row .k{color:var(--muted);font-size:.88rem;display:flex;align-items:center;gap:8px}
    .row .v{font-weight:700;font-size:.9rem;text-align:end;word-break:break-word}

    /* ---- buttons ---- */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:1px solid var(--line);
      background:var(--card-2);color:var(--text);padding:11px 14px;border-radius:var(--radius-sm);font-weight:700;
      cursor:pointer;font-family:inherit;font-size:.92rem;transition:.18s;width:100%}
    .btn:hover{transform:translateY(-1px);border-color:color-mix(in srgb,var(--accent) 50%,var(--line))}
    .btn:active{transform:translateY(0)}
    .btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent-2));border-color:transparent;color:#fff}
    .btn.copied{background:color-mix(in srgb,var(--ok) 22%,var(--card-2));border-color:var(--ok);color:var(--ok)}
    .btn-row{display:flex;gap:10px;margin-top:12px}
    .btn-row .btn{flex:1}
    .btn-sm{padding:8px 11px;font-size:.82rem;width:auto}

    /* ---- subscription box ---- */
    .sub-box{background:var(--inset);border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px 14px;
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:.8rem;color:var(--muted);
      word-break:break-all;direction:ltr;text-align:left;max-height:74px;overflow:auto}

    /* ---- quick import apps ---- */
    .chips{display:flex;flex-wrap:wrap;gap:9px;margin-top:14px}
    .chip{display:inline-flex;align-items:center;gap:7px;padding:9px 13px;border-radius:11px;border:1px solid var(--line);
      background:var(--card-2);font-weight:700;font-size:.84rem;cursor:pointer;transition:.18s}
    .chip:hover{transform:translateY(-1px);border-color:color-mix(in srgb,var(--accent) 55%,var(--line))}
    .chip .e{font-size:1.05rem}

    /* ---- config items ---- */
    .cfg{display:flex;align-items:center;gap:11px;padding:12px;border:1px solid var(--line);border-radius:var(--radius-sm);
      background:var(--card-2);margin-bottom:10px}
    .cfg:last-child{margin-bottom:0}
    .cfg .proto{flex:none;width:46px;height:46px;border-radius:12px;display:grid;place-items:center;font-weight:800;font-size:.72rem;
      background:var(--inset);border:1px solid var(--line);text-transform:uppercase}
    .cfg .meta{flex:1;min-width:0}
    .cfg .meta .t{font-weight:700;font-size:.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .cfg .meta .s{color:var(--muted);font-size:.76rem;direction:ltr;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .cfg .act{display:flex;gap:7px;flex:none}
    .cfg .act .icon-btn{width:38px;height:38px;border-radius:11px;font-size:.95rem}

    /* ---- app cards ---- */
    .app{display:flex;gap:12px;padding:13px;border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--card-2);margin-bottom:10px}
    .app:last-child{margin-bottom:0}
    .app img{width:48px;height:48px;border-radius:12px;flex:none;object-fit:cover;background:var(--inset)}
    .app .fallback{width:48px;height:48px;border-radius:12px;flex:none;display:grid;place-items:center;background:var(--inset);font-size:1.4rem}
    .app .body{flex:1;min-width:0}
    .app .body .t{font-weight:800;display:flex;align-items:center;gap:7px}
    .app .body .d{color:var(--muted);font-size:.82rem;margin:2px 0 9px}
    .app .links{display:flex;flex-wrap:wrap;gap:7px}
    .tag-rec{font-size:.66rem;font-weight:800;color:var(--accent);background:color-mix(in srgb,var(--accent) 15%,transparent);
      padding:2px 7px;border-radius:999px}

    /* ---- CTA branding ---- */
    .cta{display:grid;gap:11px}
    .cta .btn{padding:14px;font-size:.98rem}
    .cta .buy{background:linear-gradient(135deg,#16a34a,#22c55e);border:0;color:#fff}
    .cta .tg{background:linear-gradient(135deg,#229ed9,#2aabee);border:0;color:#fff}
    .cta .sp{background:var(--card-2)}
    .cta-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}

    .foot{text-align:center;color:var(--muted);font-size:.78rem;margin-top:22px;line-height:1.9}
    .foot b{color:var(--text)}
    .foot a.gh{display:inline-flex;align-items:center;gap:5px;color:inherit;transition:.15s}
    .foot a.gh:hover{color:var(--accent)}
    .foot a.gh svg{vertical-align:middle;opacity:.85}

    /* ---- toast ---- */
    .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--card);
      border:1px solid var(--line);box-shadow:var(--shadow);color:var(--text);padding:11px 18px;border-radius:13px;
      font-weight:700;font-size:.9rem;opacity:0;pointer-events:none;transition:.28s;z-index:90;display:flex;align-items:center;gap:8px}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .toast .e{color:var(--ok)}

    /* ---- QR modal ---- */
    .modal{position:fixed;inset:0;background:rgba(3,7,15,.72);backdrop-filter:blur(6px);display:none;
      align-items:center;justify-content:center;z-index:100;padding:20px}
    .modal.open{display:flex}
    .modal .panel{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);
      padding:22px;max-width:330px;width:100%;text-align:center}
    .modal .panel h3{font-size:1rem;margin-bottom:4px;word-break:break-all}
    .modal .panel p{color:var(--muted);font-size:.78rem;margin-bottom:16px}
    .qr-host{background:#fff;border-radius:16px;padding:14px;display:inline-block;line-height:0}
    .qr-host img,.qr-host canvas{display:block}
    .modal .x{margin-top:18px}

    /* ---- usage chart ---- */
    .range-btns{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
    .range-btn{padding:6px 12px;border-radius:10px;border:1px solid var(--line);background:var(--card-2);color:var(--muted);
      font-weight:700;font-size:.78rem;cursor:pointer;transition:.15s;font-family:inherit}
    .range-btn:hover{color:var(--text)}
    .range-btn.active{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;border-color:transparent}
    .chart-total{font-weight:800;color:var(--text);direction:ltr;font-family:inherit;font-size:1.02rem;
      letter-spacing:.3px;font-variant-numeric:tabular-nums}
    .chart-area{position:relative;width:100%}
    .chart-wrap{position:relative;width:100%;height:210px;touch-action:pan-y}
    .chart-svg{width:100%;height:210px;display:block;overflow:visible}
    .chart-grid{stroke:var(--line);stroke-width:1;vector-effect:non-scaling-stroke;opacity:.55}
    .chart-xlabels{position:absolute;left:0;right:0;bottom:0;height:22px;pointer-events:none}
    .xlab{position:absolute;bottom:3px;transform:translateX(-50%);font-size:.64rem;color:var(--muted);white-space:nowrap;direction:ltr}
    .chart-cursor{position:absolute;width:0;border-left:1px dashed var(--accent);opacity:.55;pointer-events:none}
    .chart-dot{position:absolute;width:11px;height:11px;border-radius:50%;background:var(--accent);
      border:2px solid var(--card);transform:translate(-50%,-50%);pointer-events:none;
      box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 25%,transparent)}
    .chart-tip{position:absolute;pointer-events:none;background:var(--card);border:1px solid var(--line);border-radius:10px;
      padding:6px 10px;box-shadow:var(--shadow);white-space:nowrap;z-index:5;transform:translate(-50%,-120%)}
    .chart-tip .tv{font-weight:800;font-family:inherit;direction:ltr;font-size:.92rem;font-variant-numeric:tabular-nums}
    .chart-tip .td{color:var(--muted);direction:ltr;font-size:.72rem;margin-bottom:2px;font-variant-numeric:tabular-nums;font-family:inherit}
    .chart-empty{height:210px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;
      color:var(--muted);font-size:.86rem;text-align:center}
    .spinner{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ---- os tabs + misc ---- */
    .os-tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin:12px 0 6px;
      background:var(--inset);border:1px solid var(--line);border-radius:14px;padding:6px}
    .os-tab{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
      padding:9px 4px;border-radius:10px;border:0;background:transparent;color:var(--muted);
      font-weight:700;font-size:.72rem;white-space:nowrap;cursor:pointer;transition:.15s;font-family:inherit}
    .os-tab:hover{color:var(--text);background:color-mix(in srgb,var(--accent) 10%,transparent)}
    .os-tab.active{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;
      box-shadow:0 4px 12px color-mix(in srgb,var(--accent) 30%,transparent)}
    .os-tab .e{font-size:1.15rem;line-height:1}
    /* keep numbers + Latin units (e.g. "32.6 GB") rendering LTR inside RTL text */
    .ltr{unicode-bidi:isolate;direction:ltr}
    .brand .logo img{width:100%;height:100%;object-fit:cover;border-radius:inherit;display:block}
    .qr-ico{width:18px;height:18px;flex:none;vertical-align:-3px}

    @media (max-width:430px){
      .ring-wrap,.ring{width:118px;height:118px}
      .ring-big{font-size:1.6rem}
      .cta-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <!-- ============================================================
       PasarGuard data injection — DO NOT EDIT this block.
       The panel fills it server-side into window.__INITIAL_DATA__
       ============================================================ -->
  <script>
    try {
      const obj = {
        user: {% if user %}{% set user_data = {
          'id': user.id,
          'username': user.username,
          'status': user.status.name if user.status else 'active',
          'used_traffic': user.used_traffic,
          'lifetime_used_traffic': user.lifetime_used_traffic,
          'data_limit': user.data_limit,
          'data_limit_reset_strategy': user.data_limit_reset_strategy.name if user.data_limit_reset_strategy else 'no_reset',
          'expire': user.expire.isoformat() if user.expire else None,
          'on_hold_expire_duration': user.on_hold_expire_duration,
          'on_hold_timeout': user.on_hold_timeout.isoformat() if user.on_hold_timeout else None,
          'group_ids': user.group_ids,
          'created_at': user.created_at.isoformat() if user.created_at else None,
          'edit_at': user.edit_at.isoformat() if user.edit_at else None,
          'online_at': user.online_at.isoformat() if user.online_at else None,
          'proxy_settings': {
            'vmess': {'id': user.proxy_settings.vmess.id|string} if user.proxy_settings.vmess else None,
            'vless': {'id': user.proxy_settings.vless.id|string, 'flow': user.proxy_settings.vless.flow.name if user.proxy_settings.vless.flow else None} if user.proxy_settings.vless else None,
            'trojan': {'password': user.proxy_settings.trojan.password} if user.proxy_settings.trojan else None,
            'shadowsocks': {'password': user.proxy_settings.shadowsocks.password, 'method': user.proxy_settings.shadowsocks.method.name if user.proxy_settings.shadowsocks.method else None} if user.proxy_settings.shadowsocks else None,
            'wireguard': {'public_key': user.proxy_settings.wireguard.public_key, 'peer_ips': user.proxy_settings.wireguard.peer_ips} if user.proxy_settings.wireguard else None,
            'hysteria': {'auth': user.proxy_settings.hysteria.auth|string} if user.proxy_settings.hysteria else None
          },
          'next_plan': {
            'user_template_id': user.next_plan.user_template_id,
            'data_limit': user.next_plan.data_limit,
            'expire': user.next_plan.expire,
            'add_remaining_traffic': user.next_plan.add_remaining_traffic
          } if user.next_plan else None,
          'admin': {
            'username': user.admin.username,
            'profile_title': user.admin.profile_title,
            'support_url': user.admin.support_url
          } if user.admin else None
        } %}{{ user_data | tojson | safe }}{% else %}null{% endif %},
        links: {{ links | tojson | safe }},
        apps: {% if apps %}{% set apps_data = [] %}{% for app in apps %}{% if app %}{% set download_links_data = [] %}{% for link in app.download_links %}{% if link %}{% set link_dict = {
          'name': link.name,
          'url': link.url,
          'language': link.language
        } %}{% set _ = download_links_data.append(link_dict) %}{% endif %}{% endfor %}{% set app_dict = {
          'name': app.name,
          'icon_url': app.icon_url,
          'import_url': app.import_url,
          'description': app.description,
          'recommended': app.recommended,
          'platform': app.platform,
          'download_links': download_links_data
        } %}{% set _ = apps_data.append(app_dict) %}{% endif %}{% endfor %}{{ apps_data | tojson | safe }}{% else %}null{% endif %},
      };
      window.__INITIAL_DATA__ = obj;
    } catch (e) {
      console.warn("Initial data not rendered (preview mode):", e);
      window.__INITIAL_DATA__ = {};
    }

    const base = { brandName:CONFIG.brandName, brandLogo:CONFIG.brandLogo, brandLogoUrl:CONFIG.brandLogoUrl,
      accent:CONFIG.accent, salesBot:CONFIG.salesBot, telegramChannel:CONFIG.telegramChannel,
      supportId:CONFIG.supportId, supportUrl:'', website:CONFIG.website };
    if (CONFIG.hideBranding) return { brandName:'', brandLogo:'', brandLogoUrl:'', accent:CONFIG.accent,
      salesBot:'', telegramChannel:'', supportId:'', supportUrl:'', website:'' };   // master switch: no branding
    const pa = CONFIG.perAdmin || {};
    const a = (data.user && data.user.admin) || null;
    if (!pa.enabled) return base;
    const uname = a && a.username ? a.username : null;
    if (!uname) return base;     // admin unknown (older panel / unassigned user) -> safe default: owner branding
    let entry;
    if (uname && pa.byAdmin){
      const key = Object.keys(pa.byAdmin).find(k => k.toLowerCase() === uname.toLowerCase());  // case-insensitive
      entry = key !== undefined ? pa.byAdmin[key] : undefined;
    }
    let b;
    if (entry !== undefined){
      b = Object.assign({}, base, entry);                  // listed admin (empty {} = owner default)
    } else if (pa.fallback === 'default'){
      b = base;                                            // unlisted admin -> show owner branding
    } else {
      b = Object.assign({}, base, { telegramChannel:'', salesBot:'', supportId:'', brandLogoUrl:'' });
      if (a && a.profile_title) b.brandName = a.profile_title;   // neutral: never leak owner channel/bot
    }
    if (!b.supportId && !b.supportUrl && a && a.support_url) b.supportUrl = a.support_url; // native per-admin support
    return b;
  }
  const B = resolveBrand();
  document.documentElement.style.setProperty('--accent', B.accent);

  let lang  = localStorage.getItem('pg_lang')  || 'fa';
  let theme = localStorage.getItem('pg_theme') || 'dark';
  let chartRange = localStorage.getItem('pg_range') || '7d';
  let osTab = detectOS();

  /* ----------------------------- i18n -------------------------------------- */
  const STR = {

      copyLink:'کپی لینک', showQr:'نمایش QR', quickAdd:'افزودن سریع به اپلیکیشن',

      nextPlan:'پلن بعدی', recommended:'پیشنهادی', secure:'اتصال شما امن و رمزنگاری‌شده است',
      st_active:'فعال', st_on_hold:'در انتظار فعال‌سازی', st_limited:'حجم تمام شده',

      copyConfig:'کپی', qr:'QR',

    en:{ subtitle:'Private Subscription Panel', volume:'Data', time:'Time',

      copied:'Copied ✅', buy:'Buy / Renew', channel:'Telegram Channel', support:'Support', site:'Website',

  };
  const t = k => (STR[lang][k] ?? k);

  /* ---------------------------- helpers ------------------------------------ */
  const FA_D = "۰۱۲۳۴۵۶۷۸۹";
  const faNum = s => String(s).replace(/[0-9]/g, d => FA_D[d]);
  const num   = n => lang === 'fa' ? faNum(n) : String(n);
  const esc   = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const pad2  = n => (n < 10 ? '0' : '') + n;
  const QR_ICON = `<svg class="qr-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="5" height="5" rx="1"/><rect x="16" y="3" width="5" height="5" rx="1"/><rect x="3" y="16" width="5" height="5" rx="1"/><path d="M21 16h-3a2 2 0 0 0-2 2v3"/><path d="M21 21v.01"/><path d="M12 7v3a2 2 0 0 1-2 2H7"/><path d="M3 12h.01"/><path d="M12 3h.01"/><path d="M12 16v.01"/><path d="M16 12h1"/><path d="M21 12v.01"/><path d="M12 21v-1"/></svg>`;

  function fmtBytes(b){
    if (b == null) return '∞';
    if (b <= 0) return num('0') + ' GB';
    const u = ['B','KB','MB','GB','TB']; let i = 0; let v = b;
    while (v >= 1024 && i < u.length - 1){ v /= 1024; i++; }
    return num(v.toFixed(v >= 100 || i < 2 ? 0 : v >= 10 ? 1 : 2)) + ' ' + u[i];
  }

  function toJalaali(gy, gm, gd){
    const gdm = [0,31,59,90,120,151,181,212,243,273,304,334];
    const gy2 = gm > 2 ? gy + 1 : gy;
    let days = 355666 + 365*gy + Math.floor((gy2+3)/4) - Math.floor((gy2+99)/100)
             + Math.floor((gy2+399)/400) + gd + gdm[gm-1];
    let jy = -1595 + 33*Math.floor(days/12053); days %= 12053;
    jy += 4*Math.floor(days/1461); days %= 1461;
    if (days > 365){ jy += Math.floor((days-1)/365); days = (days-1)%365; }
    let jm, jd;
    if (days < 186){ jm = 1 + Math.floor(days/31); jd = 1 + days%31; }
    else { jm = 7 + Math.floor((days-186)/30); jd = 1 + (days-186)%30; }
    return [jy, jm, jd];
  }
  function fmtDate(iso, withTime){
    if (!iso) return '—';
    const d = new Date(iso); if (isNaN(d)) return '—';
    let out;
    if (lang === 'fa'){
      const [jy,jm,jd] = toJalaali(d.getFullYear(), d.getMonth()+1, d.getDate());
      out = faNum(`${jy}/${pad2(jm)}/${pad2(jd)}`);
      if (withTime) out += faNum(` - ${pad2(d.getHours())}:${pad2(d.getMinutes())}`);
    } else {
      out = `${pad2(d.getDate())}/${pad2(d.getMonth()+1)}/${d.getFullYear()}`;
      if (withTime) out += ` ${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
    }
    return out;
  }
  function relTime(iso){
    if (!iso) return t('online_never');
    const diff = Date.now() - new Date(iso).getTime();
    if (diff < 0 || diff < 6e4) return t('justNow');
    const m = Math.floor(diff/6e4);
    if (m < 60) return lang==='fa' ? `${faNum(m)} دقیقه پیش` : `${m}m ago`;
    const h = Math.floor(m/60);
    if (h < 24) return lang==='fa' ? `${faNum(h)} ساعت پیش` : `${h}h ago`;
    const dd = Math.floor(h/24);
    if (dd < 30) return lang==='fa' ? `${faNum(dd)} روز پیش` : `${dd}d ago`;
    return fmtDate(iso, false);
  }

  function parseConfig(link){
    const m = /^([a-z0-9]+):\/\//i.exec(link);
    let proto = m ? m[1].toLowerCase() : 'cfg';
    let name = '';
    const hash = link.indexOf('#');
    if (hash !== -1){ try { name = decodeURIComponent(link.slice(hash+1)); } catch { name = link.slice(hash+1); } }
    if (!name && proto === 'vmess'){
      try { const j = JSON.parse(atob(link.slice(8))); name = j.ps || j.add || ''; } catch {}
    }
    if (!name) name = proto.toUpperCase() + ' config';
    return { proto, name, raw: link };
  }

  // Quick-import clients, tagged with the operating systems they support.
  const OS_LIST = [
    { key:'android', e:'🤖', fa:'اندروید', en:'Android' },
    { key:'ios',     e:'🍎', fa:'iOS',     en:'iOS' },
    { key:'windows', e:'🪟', fa:'ویندوز',  en:'Windows' },
    { key:'mac',     e:'🍏', fa:'macOS',   en:'macOS' },
    { key:'linux',   e:'🐧', fa:'لینوکس',  en:'Linux' },
  ];
  function detectOS(){
    const ua = (navigator.userAgent || '').toLowerCase();
    const plat = (navigator.platform || '').toLowerCase();
    if (/android/.test(ua)) return 'android';
    if (/iphone|ipad|ipod/.test(ua) || (/mac/.test(plat) && navigator.maxTouchPoints > 1)) return 'ios';
    if (/win/.test(ua)) return 'windows';
    if (/mac/.test(ua) || /mac/.test(plat)) return 'mac';
    if (/linux/.test(ua)) return 'linux';
    return 'android';
  }
  function clients(sub){
    const e = encodeURIComponent(sub);
    let b64 = ''; try { b64 = btoa(unescape(encodeURIComponent(sub))); } catch {}
    const nm = encodeURIComponent(B.brandName || 'Subscription');
    return [
      { name:'Hiddify',      e:'🟣', os:['android','ios','windows','mac','linux'], url:'hiddify://import/' + sub },
      { name:'sing-box',     e:'📦', os:['android','ios','windows','mac','linux'], url:'sing-box://import-remote-profile?url=' + e },
      { name:'v2rayNG',      e:'🟢', os:['android'],                              url:'v2rayng://install-sub?url=' + e },
      { name:'NekoBox',      e:'🐱', os:['android'],                              url:'sn://subscription?url=' + e },
      { name:'Clash Meta',   e:'⚡', os:['android','windows','mac','linux'],       url:'clash://install-config?url=' + e + '&name=' + nm },
      { name:'v2box',        e:'🟦', os:['ios','android'],                        url:'v2box://install-sub?url=' + e },
      { name:'Streisand',    e:'🔵', os:['ios','mac'],                            url:'streisand://import/' + sub },
      { name:'Shadowrocket', e:'🚀', os:['ios'],                                  url:'shadowrocket://add/sub://' + b64 },
    ];
  }

  function statusBadge(u){
    const map = { active:'b-ok', on_hold:'b-hold', limited:'b-warn', expired:'b-bad', disabled:'b-off', error:'b-bad' };
    const s = (u.status || 'active');
    const cls = map[s] || 'b-ok';
    return `<span class="badge ${cls}">${esc(t('st_' + s) || s)}</span>`;
  }

  function ring(pct, color, centerHtml){
    const R = 55, C = 2*Math.PI*R;
    const off = (C * (1 - Math.min(1, Math.max(0, pct/100)))).toFixed(1);
    return `<div class="ring-wrap">
      <svg class="ring" viewBox="0 0 132 132">
        <circle class="ring-bg" cx="66" cy="66" r="${R}"></circle>
        <circle class="ring-fg" cx="66" cy="66" r="${R}" stroke="${color}"
          stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${off}"></circle>
      </svg>
      <div class="ring-center">${centerHtml}</div>
    </div>`;
  }

  /* --------------------------- render sections ----------------------------- */
  function topbar(){
    const hasLogo = B.brandLogoUrl || B.brandLogo;
    const brand = (hasLogo || B.brandName)
      ? `<div class="brand">${hasLogo ? `<span class="logo">${B.brandLogoUrl ? `<img src="${esc(B.brandLogoUrl)}" alt="" />` : esc(B.brandLogo)}</span>` : ''}${B.brandName ? `<span>${esc(B.brandName)}</span>` : ''}</div>`
      : `<div></div>`;
    return `<div class="topbar">
      ${brand}
      <div class="tools">
        <button class="icon-btn" data-action="lang" title="language">${lang === 'fa' ? 'EN' : 'فا'}</button>

  function profile(u){
    const initial = (u.username || '?').slice(0,1);
    let onlineHtml;
    if (!u.online_at) onlineHtml = `<span class="muted">${t('online_never')}</span>`;
    else {
      const fresh = Date.now() - new Date(u.online_at).getTime() < 18e4;
      onlineHtml = fresh
        ? `<span class="pulse"></span>${t('justNow')}`
        : `<span class="muted">${t('online')}: ${relTime(u.online_at)}</span>`;
    }
    return `<div class="card"><div class="profile">
      <div class="avatar">${esc(initial)}</div>
      <div style="flex:1;min-width:0">
        <div class="name">${esc(u.username || 'user')}</div>
        <div class="online">${onlineHtml}</div>
      </div>
      ${statusBadge(u)}
    </div></div>`;
  }

  function stats(u){
    // ---- data ----
    const used = u.used_traffic || 0, limit = u.data_limit;
    const unlimitedData = !limit || limit <= 0;
    const pct = unlimitedData ? 0 : Math.min(100, used / limit * 100);
    const dColor = unlimitedData ? 'var(--accent)' : pct >= 90 ? 'var(--bad)' : pct >= 70 ? 'var(--warn)' : 'var(--accent)';
    const dCenter = unlimitedData
      ? `<div class="ring-big">∞</div><div class="ring-sub">${t('unlimited')}</div>`
      : `<div class="ring-big">${num(Math.round(pct))}<span class="u">%</span></div><div class="ring-sub">${t('used')}</div>`;
    const dFill = unlimitedData ? 100 : pct;
    const dDetail = unlimitedData
      ? `<div class="val"><b class="ltr">${fmtBytes(used)}</b> ${t('used')}</div>`
      : `<div class="val">${t('remaining')}: <b class="ltr">${fmtBytes(Math.max(0, limit - used))}</b></div>
         <div class="lbl small ltr">${fmtBytes(used)} / ${fmtBytes(limit)}</div>`;

    // ---- time ----
    let tColor = 'var(--accent)', tCenter, tFill = 100, tDetail;
    if (u.status === 'on_hold'){
      const days = Math.round((u.on_hold_expire_duration || 0) / 86400);
      tColor = 'var(--hold)';
      tCenter = `<div class="ring-big">${num(days)}</div><div class="ring-sub">${t('daysAfterStart')}</div>`;
      tDetail = `<div class="val muted">${t('st_on_hold')}</div>`;
    } else if (u.expire){
      const exp = new Date(u.expire), now = Date.now();
      const daysLeft = Math.ceil((exp.getTime() - now) / 864e5);
      let elapsed = 0;
      if (u.created_at){
        const cr = new Date(u.created_at).getTime(), total = exp.getTime() - cr;
        elapsed = total > 0 ? Math.min(100, Math.max(0, (now - cr) / total * 100)) : 100;
      } else elapsed = daysLeft > 30 ? 0 : Math.max(0, (1 - daysLeft/30) * 100);
      tFill = Math.max(0, 100 - elapsed);
      if (daysLeft < 0){
        tColor = 'var(--bad)'; tFill = 100;
        tCenter = `<div class="ring-big" style="font-size:1.3rem">${t('ended')}</div>`;
      } else {
        tColor = daysLeft <= 3 ? 'var(--bad)' : daysLeft <= 7 ? 'var(--warn)' : 'var(--accent)';
        tCenter = `<div class="ring-big">${num(daysLeft)}</div><div class="ring-sub">${t('daysLeft')}</div>`;
      }
      tDetail = `<div class="val">${t('expireOn')}: <b class="ltr">${fmtDate(u.expire, false)}</b></div>`;
    } else {
      tCenter = `<div class="ring-big">∞</div><div class="ring-sub">${t('unlimited')}</div>`;
      tDetail = `<div class="val muted">${t('unlimited')}</div>`;
    }

    return `<div class="stats">
      <div class="stat"><div class="lbl">${t('volume')}</div>${ring(dFill, dColor, dCenter)}${dDetail}</div>
      <div class="stat"><div class="lbl">${t('time')}</div>${ring(tFill, tColor, tCenter)}${tDetail}</div>
    </div>`;
  }

  function ctaSection(){
    const tg = h => `https://t.me/${String(h).replace(/^@/, '')}`;

    const extrasHtml = extras.length === 2 ? `<div class="cta-grid">${sp}${site}</div>` : extras.join('');
    if (!buy && !ch && !extrasHtml) return '';        // nothing to show -> no empty card
    return `<div class="card cta">${buy}${ch}${extrasHtml}</div>`;

  function footer(u){
    const rows = [];
    if (u.created_at)  rows.push([t('created'), fmtDate(u.created_at, false)]);
    if (u.data_limit_reset_strategy && u.data_limit_reset_strategy !== 'no_reset')

    const rowsHtml = rows.length

          `<div class="row"><span class="k">${r[0]}</span><span class="v">${r[1]}</span></div>`).join('')}</div></div>`
      : '';
    const brand = CONFIG.github
      ? `<a class="gh" href="${esc(CONFIG.github)}" target="_blank" rel="noopener"><b>${esc(CONFIG.footerName || CONFIG.brandName)}</b><svg viewBox="0 0 16 16" width="13" height="13" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.6 7.6 0 014 0c1.53-1.03 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg></a>`
      : `<b>${esc(CONFIG.footerName || CONFIG.brandName)}</b>`;
    return `${rowsHtml}<div class="foot">
      <div>🔒 ${t('secure')}</div>
      <div>${brand} · ${num(new Date().getFullYear())}</div>
    </div>`;
  }

  /* --------------------------- usage chart --------------------------------- */
  // Mirrors the official PasarGuard template: it fetches a usage time-series from
  // GET {sub-path}/usage?start=<ISO>&period=<minute|hour|day> and renders an area chart.
  const RANGES = ['1h', '12h', '24h', '7d', '30d', '90d'];
  if (!RANGES.includes(chartRange)) chartRange = '7d';   // guard against a stale/tampered stored value
  const chartCache = {};     // range -> { points:[{t,v}], total }
  const chartErr = {};       // range -> boolean
  const chartLoading = {};   // range -> boolean
  const CHART_VB = { W: 700, H: 210, padL: 8, padR: 8, padT: 12, padB: 26 };

  function rangeParams(range){
    let ms, period;
    switch (range){
      case '1h':  ms = 36e5;       period = 'minute'; break;
      case '12h': ms = 12 * 36e5;  period = 'hour';   break;
      case '24h': ms = 24 * 36e5;  period = 'hour';   break;
      case '30d': ms = 30 * 864e5; period = 'day';    break;
      case '90d': ms = 90 * 864e5; period = 'day';    break;
      case '7d':
      default:    ms = 7 * 864e5;  period = 'day';
    }
    return { start: new Date(Date.now() - ms), period };
  }

  async function fetchUsage(range){
    const { start, period } = rangeParams(range);
    const base = location.pathname.replace(/\/$/, '');
    const url = `${location.origin}${base}/usage?start=${encodeURIComponent(start.toISOString())}&period=${period}`;
    const res = await fetch(url, { headers: { Accept: 'application/json' }, credentials: 'same-origin' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const j = await res.json();
    const stats = j && j.stats;
    let series = [];
    if (Array.isArray(stats)) series = stats;
    else if (stats && typeof stats === 'object') series = Object.values(stats).find(Array.isArray) || [];
    return series
      .filter(p => p && p.period_start != null)
      .map(p => ({ t: p.period_start, v: +p.total_traffic || 0 }));
  }

  function sampleUsage(range){
    const counts = { '1h': 12, '12h': 12, '24h': 24, '7d': 7, '30d': 30, '90d': 90 };
    const n = counts[range] || 7;
    const { start } = rangeParams(range);
    const step = (Date.now() - start.getTime()) / n;
    const wave = [2, 1, 3, 5, 2, 4, 6, 3, 1, 2, 5, 4, 3, 6, 2, 1, 4, 5, 3, 2];
    const pts = [];
    for (let i = 0; i < n; i++)
      pts.push({ t: new Date(start.getTime() + i * step).toISOString(), v: wave[i % wave.length] * 0.4 * 1024 ** 3 });
    return pts;
  }

  function ensureChart(range){
    if (chartCache[range] || chartLoading[range]) return;
    if (isPreview){
      const pts = sampleUsage(range);
      chartCache[range] = { points: pts, total: pts.reduce((s, p) => s + p.v, 0) };
      if (range === chartRange) paintChart();
      return;
    }
    chartLoading[range] = true; chartErr[range] = false;
    fetchUsage(range)
      .then(pts => { chartCache[range] = { points: pts, total: pts.reduce((s, p) => s + p.v, 0) }; })
      .catch(() => { chartErr[range] = true; })
      .finally(() => { chartLoading[range] = false; if (range === chartRange) paintChart(); });
  }

  function chartTick(iso){
    const d = new Date(iso);
    const short = chartRange === '1h' || chartRange === '12h' || chartRange === '24h';
    if (short) return faNum(`${pad2(d.getHours())}:${pad2(d.getMinutes())}`);
    if (lang === 'fa'){ const [, jm, jd] = toJalaali(d.getFullYear(), d.getMonth() + 1, d.getDate()); return faNum(`${jm}/${jd}`); }
    return `${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]} ${d.getDate()}`;
  }
  function chartTipDate(iso){
    const short = chartRange === '1h' || chartRange === '12h' || chartRange === '24h';
    return fmtDate(iso, short);
  }

  function usageSection(){
    const c = chartCache[chartRange];
    const total = `<span class="chart-total" id="chart-total">${c && c.total > 0 ? fmtBytes(c.total) : ''}</span>`;
    const btns = RANGES.map(r =>
      `<button class="range-btn ${r === chartRange ? 'active' : ''}" data-range="${r}">${esc(t('tr_' + r))}</button>`).join('');
    return `<div class="card">
      <div class="card-h" style="justify-content:space-between">
        <span style="display:flex;align-items:center;gap:8px"><span class="dot"></span>${t('usageTitle')}</span>
        ${total}
      </div>
      <div class="range-btns">${btns}</div>
      <div class="chart-area" id="chart-area"></div>
    </div>`;
  }

  function buildChart(pts){
    const { W, H, padL, padR, padT, padB } = CHART_VB;
    const plotW = W - padL - padR, plotH = H - padT - padB, baseY = H - padB;
    const n = pts.length, maxV = Math.max(1, ...pts.map(p => p.v));
    const X = i => padL + (n === 1 ? plotW / 2 : (i / (n - 1)) * plotW);
    const Y = v => padT + (1 - v / maxV) * plotH;
    const line = pts.map((p, i) => `${i ? 'L' : 'M'} ${X(i).toFixed(1)} ${Y(p.v).toFixed(1)}`).join(' ');
    const area = `M ${X(0).toFixed(1)} ${baseY} ` +
      pts.map((p, i) => `L ${X(i).toFixed(1)} ${Y(p.v).toFixed(1)}`).join(' ') +
      ` L ${X(n - 1).toFixed(1)} ${baseY} Z`;
    let grid = '';
    for (let g = 0; g <= 2; g++){ const yy = (padT + (g / 2) * plotH).toFixed(1); grid += `<line class="chart-grid" x1="${padL}" y1="${yy}" x2="${W - padR}" y2="${yy}"/>`; }
    const want = Math.min(5, n);
    const idx = [...new Set(Array.from({ length: want }, (_, k) => Math.round(k * (n - 1) / (want - 1 || 1))))];
    const labels = idx.map(i => `<span class="xlab" style="left:${(X(i) / W * 100).toFixed(2)}%">${esc(chartTick(pts[i].t))}</span>`).join('');
    return `<div class="chart-wrap" id="chart-wrap">
      <svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
        <defs><linearGradient id="fillTraffic" x1="0" y1="0" x2="0" y2="1">
          <stop offset="5%" stop-color="var(--accent)" stop-opacity="0.55"/>
          <stop offset="95%" stop-color="var(--accent)" stop-opacity="0.04"/>
        </linearGradient></defs>
        ${grid}
        <path d="${area}" fill="url(#fillTraffic)"/>
        <path d="${line}" fill="none" stroke="var(--accent)" stroke-width="2" vector-effect="non-scaling-stroke" stroke-linejoin="round" stroke-linecap="round"/>
      </svg>
      <div class="chart-xlabels">${labels}</div>
      ${n === 1 ? `<div class="chart-dot" style="left:${(X(0) / W * 100).toFixed(2)}%;top:${(Y(pts[0].v) / H * 100).toFixed(2)}%"></div>` : ''}
      <div class="chart-cursor" id="chart-cursor" hidden></div>
      <div class="chart-dot" id="chart-dot" hidden></div>
      <div class="chart-tip" id="chart-tip" hidden></div>
    </div>`;
  }

  function attachHover(pts){
    const wrap = document.getElementById('chart-wrap'); if (!wrap) return;
    const dot = document.getElementById('chart-dot'), cur = document.getElementById('chart-cursor'), tip = document.getElementById('chart-tip');
    const { W, H, padL, padR, padT, padB } = CHART_VB;
    const plotW = W - padL - padR, plotH = H - padT - padB;
    const n = pts.length, maxV = Math.max(1, ...pts.map(p => p.v));
    const move = ev => {
      const r = wrap.getBoundingClientRect();
      const clientX = ev.touches ? ev.touches[0].clientX : ev.clientX;
      let frac = ((clientX - r.left) / r.width * W - padL) / plotW;
      frac = Math.max(0, Math.min(1, frac));
      const i = Math.round(frac * (n - 1));
      const xvb = padL + (n === 1 ? plotW / 2 : (i / (n - 1)) * plotW);
      const yvb = padT + (1 - pts[i].v / maxV) * plotH;
      const leftPct = xvb / W * 100, topPct = yvb / H * 100;
      dot.hidden = false; dot.style.left = leftPct + '%'; dot.style.top = topPct + '%';
      cur.hidden = false; cur.style.left = leftPct + '%'; cur.style.top = (padT / H * 100) + '%'; cur.style.height = (plotH / H * 100) + '%';
      tip.hidden = false; tip.style.left = leftPct + '%'; tip.style.top = topPct + '%';
      tip.style.transform = leftPct > 78 ? 'translate(-88%,-120%)' : leftPct < 22 ? 'translate(-12%,-120%)' : 'translate(-50%,-120%)';
      tip.innerHTML = `<div class="td">${esc(chartTipDate(pts[i].t))}</div><div class="tv">${fmtBytes(pts[i].v)}</div>`;
    };
    const leave = () => { dot.hidden = true; cur.hidden = true; tip.hidden = true; };
    wrap.addEventListener('pointermove', move);
    wrap.addEventListener('pointerleave', leave);
    wrap.addEventListener('touchmove', move, { passive: true });
    wrap.addEventListener('touchend', leave);
  }

  function paintChart(){
    const area = document.getElementById('chart-area'); if (!area) return;
    const c = chartCache[chartRange];
    const tot = document.getElementById('chart-total');
    if (tot) tot.textContent = c && c.total > 0 ? fmtBytes(c.total) : '';
    if (!c && chartErr[chartRange]){ area.innerHTML = `<div class="chart-empty">⚠️ ${t('chartError')}</div>`; return; }
    if (!c){ area.innerHTML = `<div class="chart-empty"><div class="spinner"></div>${t('loading')}</div>`; ensureChart(chartRange); return; }
    if (!c.points.length || c.total <= 0){
      area.innerHTML = `<div class="chart-empty"><div style="width:36px;height:36px;border:1px dashed var(--line);border-radius:50%;display:grid;place-items:center">—</div>${t('noData')}</div>`;
      return;
    }
    area.innerHTML = buildChart(c.points);
    attachHover(c.points);
  }

  /* ------------------------------ mount ------------------------------------ */
  const app = document.getElementById('app');
  function render(){
    const root = document.documentElement;
    root.lang = lang; root.dir = lang === 'fa' ? 'rtl' : 'ltr';
    root.dataset.theme = theme;
    const u = data.user;
    app.innerHTML = topbar() + profile(u) + stats(u) + usageSection() + subCard()
      + configsSection() + appsSection() + ctaSection() + footer(u);
    document.title = B.brandName ? `${u.username || B.brandName} · ${B.brandName}` : (u.username || 'Subscription');
    paintChart();
  }

  /* ---------------------------- interactions ------------------------------- */
  const toastEl = document.getElementById('toast');
  const toastMsg = document.getElementById('toast-msg');
  let toastTimer;
  function toast(msg){
    toastMsg.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1800);
  }

  async function copy(text){
    try { await navigator.clipboard.writeText(text); }
    catch {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.focus(); ta.select();
      try { document.execCommand('copy'); } catch {}
      ta.remove();
    }
    toast(t('copied'));
  }

  const modal = document.getElementById('modal');
  const qrHost = document.getElementById('qr-host');
  const qrTitle = document.getElementById('qr-title');
  const qrSub = document.getElementById('qr-sub');
  function showQR(text, title){
    qrTitle.textContent = title || '';
    qrSub.textContent = text.length > 60 ? text.slice(0, 57) + '…' : text;
    qrHost.innerHTML = '';
    try {
      new QRCode(qrHost, { text, width: 232, height: 232,
        colorDark:'#0a0e16', colorLight:'#ffffff', correctLevel: QRCode.CorrectLevel.L });
    } catch (e){ qrHost.innerHTML = '<div style="color:#000;padding:30px">QR error</div>'; }
    modal.classList.add('open');
  }
  function closeQR(){ modal.classList.remove('open'); qrHost.innerHTML = ''; }
  document.getElementById('qr-close').addEventListener('click', closeQR);
  modal.addEventListener('click', e => { if (e.target === modal) closeQR(); });

  document.addEventListener('click', e => {
    const a = e.target.closest('[data-action]');
    if (a){
      const act = a.dataset.action;
      if (act === 'lang'){ lang = lang === 'fa' ? 'en' : 'fa'; localStorage.setItem('pg_lang', lang); render(); }
      else if (act === 'theme'){ theme = theme === 'dark' ? 'light' : 'dark'; localStorage.setItem('pg_theme', theme); render(); }
      else if (act === 'copy-sub'){ copy(subUrl); }
      else if (act === 'qr-sub'){ showQR(subUrl, t('subLink')); }
      else if (act === 'copy-all'){ copy(LINKS.join('\n')); }
      return;
    }
    const rb = e.target.closest('[data-range]');
    if (rb){ const r = rb.dataset.range; if (r !== chartRange){ chartRange = r; localStorage.setItem('pg_range', r); render(); } return; }
    const ob = e.target.closest('[data-os]');
    if (ob){ const o = ob.dataset.os; if (o !== osTab){ osTab = o; render(); } return; }
    const ci = e.target.closest('[data-copy-idx]');
    if (ci){ copy(LINKS[+ci.dataset.copyIdx]); return; }
    const qi = e.target.closest('[data-qr-idx]');
    if (qi){ const i = +qi.dataset.qrIdx; showQR(LINKS[i], parseConfig(LINKS[i]).name); return; }
  });

  render();
  </script>
</body>
</html>
